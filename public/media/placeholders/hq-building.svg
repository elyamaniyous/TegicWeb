<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="hsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e2f1a"/>
      <stop offset="0.65" stop-color="#07190e"/>
      <stop offset="1" stop-color="#041108"/>
    </linearGradient>
    <radialGradient id="hglow" cx="0.5" cy="0.2" r="0.65">
      <stop offset="0" stop-color="#2fa44a" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#2fa44a" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain6">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#hsky)"/>
  <rect width="1600" height="1000" fill="url(#hglow)"/>
  <g fill="none" stroke="#4fc063" stroke-opacity="0.13">
    <circle cx="800" cy="240" r="130" stroke-width="42"/>
    <circle cx="800" cy="240" r="260" stroke-width="56"/>
  </g>
  <!-- bâtiment -->
  <rect x="180" y="420" width="1240" height="320" rx="10" fill="#07190e" stroke="#145426" stroke-width="5"/>
  <rect x="620" y="330" width="360" height="90" rx="8" fill="#020a05"/>
  <g fill="#145426" fill-opacity="0.5">
    <rect x="240" y="480" width="150" height="70" rx="4"/>
    <rect x="430" y="480" width="150" height="70" rx="4"/>
    <rect x="1020" y="480" width="150" height="70" rx="4"/>
    <rect x="1210" y="480" width="150" height="70" rx="4"/>
    <rect x="660" y="360" width="280" height="40" rx="4"/>
  </g>
  <!-- végétation toit-terrasse -->
  <g fill="#145426">
    <circle cx="300" cy="415" r="22"/><circle cx="350" cy="408" r="16"/>
    <circle cx="1260" cy="415" r="22"/><circle cx="1310" cy="408" r="16"/>
  </g>
  <!-- quais -->
  <g fill="#0a2214" stroke="#145426" stroke-width="4">
    <rect x="300" y="620" width="130" height="120" rx="6"/>
    <rect x="500" y="620" width="130" height="120" rx="6"/>
    <rect x="970" y="620" width="130" height="120" rx="6"/>
    <rect x="1170" y="620" width="130" height="120" rx="6"/>
  </g>
  <rect y="740" width="1600" height="260" fill="#020a05"/>
  <circle cx="800" cy="300" r="8" fill="#7fe08f"/>
  <rect width="1600" height="1000" filter="url(#grain6)" opacity="0.5"/>
</svg>
