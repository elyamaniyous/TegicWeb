      <stop offset="0" stop-color="#0e2f1a"/>
      <stop offset="0.55" stop-color="#07190e"/>
      <stop offset="1" stop-color="#041108"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.32" r="0.6">
